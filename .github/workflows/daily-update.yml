name: 每日更新與部署

on:
  schedule:
    # cron 為 UTC。證交所 STOCK_DAY_ALL 當日收盤資料常較晚才上架，故跑兩次：
    # 1) 台灣當天 21:30 (UTC 13:30) 先試抓當日收盤
    - cron: "30 13 * * 1-5"
    # 2) 台灣隔日 08:00 (UTC 00:00, 週二~週六) 補抓，確保前一交易日收盤一定到位
    - cron: "0 0 * * 2-6"
  push:
    branches: [main]   # 推程式碼到 main 時自動重建並部署
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write   # 讓更新後的資料 commit 回 repo
  pages: write      # 部署到 GitHub Pages
  id-token: write

# 避免同時多個部署互相覆蓋
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: 抓取資料 + 產生評論
        env:
          # 設定 secret 後自動啟用 AI 評論(方案 B)；未設定則只用規則式(方案 A)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run update

      - name: Commit 更新後的資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "今日無資料變動(休市或已更新)，略過 commit。"
          else
            git commit -m "data: 更新收盤資料與評論 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Build 前端
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
